# AlphaQuant AI - Standalone Docker Compose
# One-command deployment with SQLite (no PostgreSQL/Redis needed)
# Usage: docker compose -f docker-compose.standalone.yml up -d

version: "3.9"

services:
  alphaquant:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    ports:
      - "8888:8888"
    volumes:
      - alphaquant_data:/app/data
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - JWT_SECRET_KEY=change-this-to-a-random-secret-in-production
      - LOG_LEVEL=info

volumes:
  alphaquant_data:
